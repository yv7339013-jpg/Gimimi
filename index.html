<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Canvas - Advanced Layer System</title>

<style>
:root { --bg: #1a1a1a; --panel: #2d2d2d; --accent: #00a2ff; --text: #eee; }

* { box-sizing: border-box; touch-action: none; user-select: none; }

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
}

/* TOOLBAR */
#toolbar {
  width: 75px;
  background: var(--panel);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 5px;
  gap: 8px;
}

/* CANVAS */
#canvas-wrapper {
  flex: 1;
  position: relative;
  background: white; /* FIX: putih */
  overflow: hidden;
}

#canvas-container {
  position: relative;
  width: 100%;
  height: 100%;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* LAYERS */
#layer-panel {
  position: fixed;
  left: 85px;
  top: 10px;
  width: 280px;
  bottom: 80px;
  background: var(--panel);
  display: none;
  flex-direction: column;
  border-radius: 10px;
}

.layer-item {
  background: #3d3d3d;
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
}

.layer-row-top {
  display: flex;
  align-items: center;
  gap: 5px;
}

.handle {
  cursor: grab;
}

.layer-lock.active {
  background: yellow;
  color: black;
}
</style>
</head>

<body>

<div id="toolbar">
  <div class="history-tools">
    <button onclick="undo()">&lt;</button>
    <button onclick="redo()">&gt;</button>
  </div>

  <div id="color-palette"></div>

  <div class="tool active" data-tool="brush" data-size="2">🖊️</div>
  <div class="tool" data-tool="eraser" data-size="40">🧽</div>

  <!-- Mid DIHAPUS SESUAI PERMINTAAN -->
</div>

<div id="canvas-wrapper">
  <div id="canvas-container"></div>
</div>

<button onclick="toggleLayerPanel()">LAYERS</button>

<div id="layer-panel">
  <div id="layer-list"></div>
</div>

<script>
const container = document.getElementById("canvas-container");
const layerListUI = document.getElementById("layer-list");

let layers = [];
let activeIndex = 0;
let isDrawing = false;

let currentTool = "brush";
let currentSize = 2;
let eraserSize = 40;
let currentColor = "#000000";

/* INIT */
function init() {
  addLayer();
}

/* LAYER */
function addLayer() {
  const canvas = document.createElement("canvas");
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
  container.appendChild(canvas);

  const ctx = canvas.getContext("2d");
  ctx.lineCap = "round";

  const layer = {
    id: Date.now(),
    canvas,
    ctx,
    visible: true,
    locked: false,
    name: "Layer " + (layers.length + 1)
  };

  layers.unshift(layer);
  activeIndex = 0;
  refreshLayers();
}

/* DRAG & DROP */
let dragIndex = null;

function refreshLayers() {
  layerListUI.innerHTML = "";

  layers.forEach((layer, i) => {
    layer.canvas.style.zIndex = layers.length - i;

    const div = document.createElement("div");
    div.className = "layer-item";
    div.draggable = true;

    div.ondragstart = () => dragIndex = i;
    div.ondrop = () => {
      const temp = layers[dragIndex];
      layers.splice(dragIndex, 1);
      layers.splice(i, 0, temp);
      refreshLayers();
    };
    div.ondragover = e => e.preventDefault();

    div.innerHTML = `
      <div class="layer-row-top">
        <span class="handle">≡</span>

        <button class="layer-lock ${layer.locked ? "active" : ""}"
          onclick="toggleLock(${i})">
          🔒
        </button>

        <button onclick="deleteLayer(${i})">🗑️</button>

        <input value="${layer.name}" onchange="layers[${i}].name=this.value">
      </div>
    `;

    layerListUI.appendChild(div);
  });
}

/* DELETE LAYER */
function deleteLayer(i) {
  container.removeChild(layers[i].canvas);
  layers.splice(i, 1);
  refreshLayers();
}

/* LOCK */
function toggleLock(i) {
  layers[i].locked = !layers[i].locked;
  refreshLayers();
}

/* DRAW */
function getCoords(e) {
  const r = container.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

container.addEventListener("mousedown", e => {
  isDrawing = true;
  const layer = layers[activeIndex];
  const {x,y} = getCoords(e);
  layer.ctx.beginPath();
  layer.ctx.moveTo(x,y);
});

container.addEventListener("mousemove", e => {
  if (!isDrawing) return;

  const layer = layers[activeIndex];
  if (layer.locked) return;

  const {x,y} = getCoords(e);

  if (currentTool === "eraser") {
    layer.ctx.globalCompositeOperation = "destination-out";
    layer.ctx.lineWidth = eraserSize;
  } else {
    layer.ctx.globalCompositeOperation = "source-over";
    layer.ctx.strokeStyle = currentColor;
    layer.ctx.lineWidth = currentSize;
  }

  layer.ctx.lineTo(x,y);
  layer.ctx.stroke();
});

container.addEventListener("mouseup", () => isDrawing = false);

window.onload = init;
</script>

</body>
    </html>
