<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pro Canvas - Advanced Layer System</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #2d2d2d;
      --accent: #00a2ff;
      --text: #eee;
      --danger: #dc3545;
      --warning: #ffc107;
    }

    * {
      box-sizing: border-box;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    /* ── TOOLBAR KIRI ── */
    #toolbar {
      width: 75px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 5px;
      gap: 8px;
      border-right: 1px solid #444;
      z-index: 100;
      flex-shrink: 0;
    }

    .history-tools {
      display: flex;
      gap: 4px;
      width: 65px;
    }

    .btn-hist {
      flex: 1;
      height: 35px;
      background: #444;
      border: 1px solid #555;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    #color-palette {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      width: 65px;
    }

    .color-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
    }

    .color-circle.active-color {
      border-color: white;
      box-shadow: 0 0 5px white;
    }

    .tool {
      width: 65px;
      height: 50px;
      cursor: pointer;
      background: #3d3d3d;
      border: 1px solid #555;
      border-radius: 10px;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: 0.2s;
    }

    .tool.active {
      border: 2px solid var(--accent);
      background: #4a4a4a;
      box-shadow: 0 0 10px var(--accent);
    }

    /* ── CANVAS AREA ── */
    #canvas-wrapper {
      flex-grow: 1;
      position: relative;
      overflow: hidden;
      background: #888;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(45deg, #999 25%, transparent 25%),
        linear-gradient(-45deg, #999 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #999 75%),
        linear-gradient(-45deg, transparent 75%, #999 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      opacity: 0.3;
      pointer-events: none;
    }

    #canvas-container {
      position: relative;
      background: #ffffff;
      box-shadow: 0 4px 40px rgba(0,0,0,0.6);
      transform-origin: center center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── EYEDROPPER LOUPE ── */
    #eyedropper-loupe {
      position: fixed;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.3);
      pointer-events: none;
      display: none;
      overflow: hidden;
      z-index: 9999;
      transform: translate(-50%, calc(-100% - 20px));
    }

    #eyedropper-loupe canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }

    /* Crosshair di tengah loupe */
    #eyedropper-loupe::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.8) 0, rgba(255,255,255,0.8) calc(50% - 1px), transparent calc(50% - 1px),
          transparent calc(50% + 1px), rgba(255,255,255,0.8) calc(50% + 1px), rgba(255,255,255,0.8) 100%),
        linear-gradient(90deg, rgba(255,255,255,0.8) 0, rgba(255,255,255,0.8) calc(50% - 1px), transparent calc(50% - 1px),
          transparent calc(50% + 1px), rgba(255,255,255,0.8) calc(50% + 1px), rgba(255,255,255,0.8) 100%);
      pointer-events: none;
      z-index: 2;
      border-radius: 50%;
      opacity: 0.4;
    }

    /* Border warna hasil pick */
    #eyedropper-ring {
      position: fixed;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      pointer-events: none;
      display: none;
      z-index: 9998;
      transform: translate(-50%, calc(-100% - 17px));
      transition: background 0.05s;
    }

    /* Label warna hex di bawah loupe */
    #eyedropper-label {
      position: fixed;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 11px;
      font-family: monospace;
      padding: 3px 8px;
      border-radius: 10px;
      pointer-events: none;
      display: none;
      z-index: 9999;
      transform: translate(-50%, 10px);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    /* ── LAYER PANEL ── */
    #layer-panel {
      position: fixed;
      left: 85px;
      top: 10px;
      bottom: 80px;
      width: 280px;
      background: var(--panel);
      border-radius: 15px;
      display: none;
      flex-direction: column;
      border: 1px solid #444;
      box-shadow: 0 15px 40px rgba(0,0,0,0.8);
      z-index: 200;
    }

    .panel-header {
      padding: 12px 15px;
      background: #383838;
      font-weight: bold;
      border-radius: 15px 15px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #layer-list {
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-grow: 1;
    }

    .layer-item {
      background: #3d3d3d;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .layer-item.selected { border-color: var(--accent); background: #4a4a4a; }
    .layer-item.dragging  { opacity: 0.5; border: 2px dashed var(--accent); }

    .layer-row-top { display: flex; align-items: center; gap: 8px; }

    .layer-name {
      font-size: 11px;
      font-weight: bold;
      flex-grow: 1;
      cursor: text;
      background: transparent;
      border: none;
      color: white;
    }

    .layer-controls { display: flex; gap: 4px; align-items: center; }

    .layer-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 5px;
    }

    .layer-meta span { font-size: 9px; color: #aaa; }
    .layer-meta select {
      background: #222;
      color: white;
      border: none;
      font-size: 10px;
      border-radius: 4px;
    }
    .layer-meta input[type="range"] { width: 60px; height: 4px; }

    /* ── FLOATING PANELS ── */
    .floating-panel {
      position: fixed;
      right: 20px;
      bottom: 90px;
      width: 220px;
      background: var(--panel);
      border: 1px solid #555;
      border-radius: 12px;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 205;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .floating-panel h4 { margin: 0 0 5px 0; font-size: 12px; color: var(--accent); }

    .setting-row { display: flex; flex-direction: column; gap: 4px; }
    .setting-row label { font-size: 10px; display: flex; justify-content: space-between; }

    input[type="range"] { width: 100%; cursor: pointer; }

    /* ── BUTTONS ── */
    .toggle-layers-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 0 20px;
      height: 50px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      z-index: 101;
    }

    .handle { cursor: grab; color: #888; padding-right: 5px; font-size: 18px; }

    .btn-ui {
      background: #555;
      border: none;
      color: white;
      border-radius: 4px;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn-locked { background: var(--warning) !important; color: black !important; }

    /* ── HSB COLOR PICKER ── */
    #color-panel {
      width: 240px;
      gap: 12px;
    }

    #hsb-sb-box {
      position: relative;
      width: 100%;
      height: 160px;
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
      flex-shrink: 0;
    }

    #hsb-sb-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hsb-sb-cursor {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 4px rgba(0,0,0,0.8);
      pointer-events: none;
      transform: translate(-50%, -50%);
      top: 0; left: 100%;
    }

    #hsb-hue-wrap {
      position: relative;
      height: 18px;
      border-radius: 9px;
      overflow: visible;
      flex-shrink: 0;
    }

    #hsb-hue-track {
      width: 100%;
      height: 100%;
      border-radius: 9px;
      background: linear-gradient(to right,
        #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
    }

    #hsb-hue-thumb {
      position: absolute;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 4px rgba(0,0,0,0.6);
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: none;
    }

    .hsb-preview-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #hsb-preview-swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #666;
      flex-shrink: 0;
    }

    #hsb-hex-input {
      flex-grow: 1;
      background: #1a1a1a;
      border: 1px solid #555;
      color: white;
      border-radius: 6px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 13px;
      width: 0;
      touch-action: auto;
    }

    #hsb-hex-input:focus {
      outline: 1px solid var(--accent);
    }
  </style>
</head>
<body>

  <!-- TOOLBAR KIRI -->
  <div id="toolbar">
    <div class="history-tools">
      <button class="btn-hist" onclick="undo()">&lt;</button>
      <button class="btn-hist" onclick="redo()">&gt;</button>
    </div>
    <hr style="width:100%; border-color:#444; margin:2px 0;">
    <div id="color-palette"></div>
    <button class="tool" onclick="toggleFloating('color-panel')">🎨<br>Pick</button>
    <hr style="width:100%; border-color:#444; margin:2px 0;">
    <div class="tool active" data-tool="brush" data-size="2"><span>🖊️</span>Thin</div>
    <div class="tool" data-tool="eraser" data-size="40"><span>🧽</span>Eraser</div>
    <button class="tool" onclick="toggleFloating('brush-panel')">⚙️<br>Settings</button>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrapper">
    <div id="canvas-container"></div>
  </div>

  <!-- EYEDROPPER UI -->
  <div id="eyedropper-ring"></div>
  <div id="eyedropper-loupe"><canvas id="loupe-canvas"></canvas></div>
  <div id="eyedropper-label">#000000</div>

  <!-- LAYER TOGGLE BUTTON -->
  <button class="toggle-layers-btn" onclick="toggleLayerPanel()">📑 LAYERS</button>

  <!-- BRUSH SETTINGS PANEL -->
  <div id="brush-panel" class="floating-panel">
    <h4>Brush Settings</h4>
    <div class="setting-row">
      <label>Brush Size <span id="val-brush-size">2</span></label>
      <input type="range" min="1" max="200" value="2" oninput="updateBrushSize(this.value)">
    </div>
    <div class="setting-row">
      <label>Opacity <span id="val-brush-op">100%</span></label>
      <input type="range" min="1" max="100" value="100" oninput="updateBrushOpacity(this.value)">
    </div>
    <div class="setting-row">
      <label>Eraser Size <span id="val-eraser-size">40</span></label>
      <input type="range" min="1" max="300" value="40" oninput="updateEraserSize(this.value)">
    </div>
  </div>

  <!-- HSB COLOR PICKER PANEL -->
  <div id="color-panel" class="floating-panel">
    <h4>Color Picker</h4>
    <div id="hsb-sb-box">
      <canvas id="hsb-sb-canvas"></canvas>
      <div id="hsb-sb-cursor"></div>
    </div>
    <div id="hsb-hue-wrap">
      <div id="hsb-hue-track"></div>
      <div id="hsb-hue-thumb"></div>
    </div>
    <div class="hsb-preview-row">
      <div id="hsb-preview-swatch"></div>
      <input id="hsb-hex-input" type="text" maxlength="7" value="#000000"
        oninput="onHexInputChange(this.value)"
        onclick="event.stopPropagation()">
    </div>
  </div>

  <!-- LAYER PANEL -->
  <div id="layer-panel">
    <div class="panel-header">
      LAYERS
      <button class="btn-ui" style="background:var(--accent)" onclick="addLayer()">+ New</button>
    </div>
    <div id="layer-list"></div>
    <div style="padding:10px; border-top:1px solid #444;">
      <button class="btn-ui" style="width:100%" onclick="mergeDown()">▼ Merge Down</button>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════════
       CANVAS SETUP
    ══════════════════════════════════════════════ */
    const wrapper   = document.getElementById('canvas-wrapper');
    const container = document.getElementById('canvas-container');

    const CANVAS_W = 1536;
    const CANVAS_H = 2048;

    let baseDisplayW = 1;
    let baseDisplayH = 1;

    function fitCanvas() {
      const pad = 40;
      const ww  = wrapper.clientWidth  - pad * 2;
      const wh  = wrapper.clientHeight - pad * 2;
      const scale = Math.min(ww / CANVAS_W, wh / CANVAS_H);
      baseDisplayW = CANVAS_W * scale;
      baseDisplayH = CANVAS_H * scale;
      container.style.width  = baseDisplayW + 'px';
      container.style.height = baseDisplayH + 'px';
      layers.forEach(l => {
        if (l.canvas.width !== CANVAS_W) {
          l.canvas.width  = CANVAS_W;
          l.canvas.height = CANVAS_H;
        }
      });
    }

    /* ══════════════════════════════════════════════
       STATE
    ══════════════════════════════════════════════ */
    const layerListUI = document.getElementById('layer-list');
    const paletteUI   = document.getElementById('color-palette');

    let layers        = [];
    let activeIndex   = 0;
    let isDrawing     = false;
    let currentTool   = 'brush';
    let currentSize   = 2;
    let eraserSize    = 40;
    let currentColor  = '#000000';
    let brushOpacity  = 1.0;
    let historyStack  = [];
    let redoStack     = [];
    let dragItemIndex = null;

    const customColors = ['#FFC74E','#000000','#FFFFFF','#BE6D6A','#747DAB','#767676'];

    /* ══════════════════════════════════════════════
       PINCH / PAN / ROTATE
    ══════════════════════════════════════════════ */
    let transform  = { x: 0, y: 0, scale: 1, rot: 0 };
    let touches    = {};
    let pinchStart = null;

    function applyTransform() {
      container.style.transform =
        `translate(${transform.x}px, ${transform.y}px) rotate(${transform.rot}rad) scale(${transform.scale})`;
    }

    function dist2(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function angle2(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

    wrapper.addEventListener('touchstart', e => {
      for (const t of e.changedTouches) {
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
      }

      const ids = Object.keys(touches);
      if (ids.length === 2) {
        cancelLongPress();
        if (isDrawing) {
          isDrawing = false;
          const ctx = layers[activeIndex]?.ctx;
          if (ctx) { ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; }
        }
        const a = touches[ids[0]], b = touches[ids[1]];
        pinchStart = {
          dist: dist2(a,b), angle: angle2(a,b),
          midX: (a.x+b.x)/2, midY: (a.y+b.y)/2,
          tx: transform.x, ty: transform.y,
          scale: transform.scale, rot: transform.rot
        };
      } else if (ids.length === 1 && e.touches.length === 1) {
        e.preventDefault();
        startLongPressTimer(e);
        startDrawing(e);
      }
    }, { passive: false });

    wrapper.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (touches[t.identifier]) touches[t.identifier] = { x: t.clientX, y: t.clientY };
      }

      const ids = Object.keys(touches);
      if (ids.length === 2 && pinchStart) {
        const a = touches[ids[0]], b = touches[ids[1]];
        const newDist  = dist2(a, b);
        const newAngle = angle2(a, b);
        const newMidX  = (a.x+b.x)/2;
        const newMidY  = (a.y+b.y)/2;

        const scaleFactor = newDist / pinchStart.dist;
        const rotDelta    = newAngle - pinchStart.angle;
        const panX        = newMidX - pinchStart.midX;
        const panY        = newMidY - pinchStart.midY;

        transform.scale = Math.min(10, Math.max(0.1, pinchStart.scale * scaleFactor));
        transform.rot   = pinchStart.rot + rotDelta;
        transform.x     = pinchStart.tx + panX;
        transform.y     = pinchStart.ty + panY;
        applyTransform();
      } else if (ids.length === 1 && e.touches.length === 1) {
        if (isEyedropperActive) {
          // Update loupe saat geser
          updateEyedropperLoupe(e.touches[0].clientX, e.touches[0].clientY);
        } else {
          // Kalau gerak terlalu jauh, batalkan long press
          const t0 = e.changedTouches[0];
          if (longPressStartPos) {
            const dx = t0.clientX - longPressStartPos.x;
            const dy = t0.clientY - longPressStartPos.y;
            if (Math.hypot(dx, dy) > 10) cancelLongPress();
          }
          draw(e);
        }
      }
    }, { passive: false });

    wrapper.addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        delete touches[t.identifier];
      }
      const remaining = Object.keys(touches).length;
      if (remaining < 2) pinchStart = null;

      if (e.touches.length === 0) {
        if (isEyedropperActive) {
          commitEyedropper();
        } else {
          cancelLongPress();
          stopDrawing();
        }
      } else if (e.touches.length === 1 && remaining === 1) {
        cancelLongPress();
        if (isDrawing) {
          isDrawing = false;
          const ctx = layers[activeIndex]?.ctx;
          if (ctx) { ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; }
        }
        startDrawing({ touches: e.touches });
      }
    }, { passive: false });

    /* ══════════════════════════════════════════════
       EYEDROPPER — LONG PRESS
    ══════════════════════════════════════════════ */
    const LONG_PRESS_MS = 500;  // durasi tahan (ms)

    let longPressTimer    = null;
    let longPressStartPos = null;
    let isEyedropperActive = false;

    const loupeEl   = document.getElementById('eyedropper-loupe');
    const loupeCtx  = document.getElementById('loupe-canvas').getContext('2d');
    const ringEl    = document.getElementById('eyedropper-ring');
    const labelEl   = document.getElementById('eyedropper-label');

    // Kanvas gabungan untuk sampling warna dari semua layer
    const flatCanvas = document.createElement('canvas');
    flatCanvas.width  = CANVAS_W;
    flatCanvas.height = CANVAS_H;
    const flatCtx = flatCanvas.getContext('2d');

    function startLongPressTimer(e) {
      const t = e.touches[0];
      longPressStartPos = { x: t.clientX, y: t.clientY };

      longPressTimer = setTimeout(() => {
        // Batalkan stroke yang mungkin sudah dimulai
        isDrawing = false;
        const ctx = layers[activeIndex]?.ctx;
        if (ctx) {
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation = 'source-over';
        }

        isEyedropperActive = true;

        // Flatten semua layer yang visible ke flatCanvas
        flatCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        [...layers].reverse().forEach(l => {
          if (!l.visible) return;
          flatCtx.globalAlpha              = l.opacity;
          flatCtx.globalCompositeOperation = l.blend;
          flatCtx.drawImage(l.canvas, 0, 0);
        });
        flatCtx.globalAlpha              = 1;
        flatCtx.globalCompositeOperation = 'source-over';

        // Tampilkan loupe di posisi awal
        updateEyedropperLoupe(longPressStartPos.x, longPressStartPos.y);

        // Vibrate feedback (kalau browser support)
        if (navigator.vibrate) navigator.vibrate(30);

      }, LONG_PRESS_MS);
    }

    function cancelLongPress() {
      clearTimeout(longPressTimer);
      longPressTimer    = null;
      longPressStartPos = null;
      if (!isEyedropperActive) return;
      hideEyedropperUI();
    }

    function updateEyedropperLoupe(clientX, clientY) {
      // Koordinat logis di canvas
      const { x, y } = getCoordsByClient(clientX, clientY);
      const cx = Math.round(x);
      const cy = Math.round(y);

      // Ambil warna piksel
      const px = flatCtx.getImageData(cx, cy, 1, 1).data;
      const hex = '#' + [px[0], px[1], px[2]].map(n => n.toString(16).padStart(2,'0')).join('');

      // Update ring warna
      ringEl.style.background = hex;
      ringEl.style.display    = 'block';
      ringEl.style.left       = clientX + 'px';
      ringEl.style.top        = clientY + 'px';

      // Update label hex
      labelEl.textContent  = hex.toUpperCase();
      labelEl.style.display = 'block';
      labelEl.style.left    = clientX + 'px';
      labelEl.style.top     = clientY + 'px';

      // Gambar loupe — zoom 8× area 10×10 piksel di tengah
      const ZOOM    = 8;
      const SAMPLE  = 10; // piksel logical per sisi
      const LW      = 80;
      const LH      = 80;

      loupeEl.style.display = 'block';
      loupeEl.style.left    = clientX + 'px';
      loupeEl.style.top     = clientY + 'px';

      const lc = document.getElementById('loupe-canvas');
      lc.width  = LW;
      lc.height = LH;

      loupeCtx.imageSmoothingEnabled = false;
      loupeCtx.clearRect(0, 0, LW, LH);
      loupeCtx.drawImage(
        flatCanvas,
        cx - SAMPLE / 2, cy - SAMPLE / 2, SAMPLE, SAMPLE,
        0, 0, LW, LH
      );

      // Highlight piksel tengah
      const cellSize = LW / SAMPLE;
      loupeCtx.strokeStyle = 'rgba(255,255,255,0.9)';
      loupeCtx.lineWidth   = 2;
      loupeCtx.strokeRect(
        (SAMPLE / 2 - 0.5) * cellSize,
        (SAMPLE / 2 - 0.5) * cellSize,
        cellSize, cellSize
      );
    }

    function commitEyedropper() {
      // Ambil warna dari label (sudah dihitung di updateEyedropperLoupe)
      const hex = labelEl.textContent;
      if (/^#[0-9a-fA-F]{6}$/i.test(hex)) {
        updateColor(hex);
        // Sync HSB picker
        const rgb = hexToRgb(hex);
        const h2  = rgbToHSB(rgb.r, rgb.g, rgb.b);
        hsb.h = h2.h; hsb.s = h2.s; hsb.b = h2.b;
        drawSBGradient();
        updateHSBUI();
      }
      hideEyedropperUI();
      if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
    }

    function hideEyedropperUI() {
      isEyedropperActive = false;
      loupeEl.style.display  = 'none';
      ringEl.style.display   = 'none';
      labelEl.style.display  = 'none';
      longPressTimer    = null;
      longPressStartPos = null;
    }

    /* ══════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════ */
    function init() {
      customColors.forEach(color => {
        const circle = document.createElement('div');
        circle.className = `color-circle ${color === '#000000' ? 'active-color' : ''}`;
        circle.style.backgroundColor = color;
        circle.onclick = () => updateColor(color);
        paletteUI.appendChild(circle);
      });
      fitCanvas();
      addLayer();
      initHSBPicker();
      window.addEventListener('resize', fitCanvas);
    }

    /* ══════════════════════════════════════════════
       FLOATING PANELS
    ══════════════════════════════════════════════ */
    function toggleFloating(id) {
      ['brush-panel','color-panel'].forEach(p => {
        const el = document.getElementById(p);
        el.style.display = (p === id && el.style.display !== 'flex') ? 'flex' : 'none';
      });
    }

    /* ══════════════════════════════════════════════
       HSB COLOR PICKER
    ══════════════════════════════════════════════ */
    let hsb = { h: 0, s: 0, b: 0 };

    const sbBox    = document.getElementById('hsb-sb-box');
    const sbCanvas = document.getElementById('hsb-sb-canvas');
    const sbCtx    = sbCanvas.getContext('2d');
    const sbCursor = document.getElementById('hsb-sb-cursor');
    const hueWrap  = document.getElementById('hsb-hue-wrap');
    const hueTrack = document.getElementById('hsb-hue-track');
    const hueThumb = document.getElementById('hsb-hue-thumb');
    const hexInput = document.getElementById('hsb-hex-input');
    const swatch   = document.getElementById('hsb-preview-swatch');

    function initHSBPicker() {
      drawSBGradient();
      updateHSBUI();

      sbBox.addEventListener('mousedown', e => {
        e.stopPropagation();
        moveSBCursor(e);
        const onMove = ev => moveSBCursor(ev);
        const onUp   = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });

      sbBox.addEventListener('touchstart', e => {
        e.stopPropagation(); e.preventDefault();
        moveSBCursorTouch(e);
        const onMove = ev => { ev.preventDefault(); moveSBCursorTouch(ev); };
        const onUp   = () => { window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp);
      }, { passive: false });

      hueWrap.addEventListener('mousedown', e => {
        e.stopPropagation();
        moveHueThumb(e);
        const onMove = ev => moveHueThumb(ev);
        const onUp   = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });

      hueWrap.addEventListener('touchstart', e => {
        e.stopPropagation(); e.preventDefault();
        moveHueThumbTouch(e);
        const onMove = ev => { ev.preventDefault(); moveHueThumbTouch(ev); };
        const onUp   = () => { window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp);
      }, { passive: false });
    }

    function moveSBCursor(e) {
      const rect = sbBox.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const y = Math.max(0, Math.min(e.clientY - rect.top,  rect.height));
      hsb.s = x / rect.width;
      hsb.b = 1 - y / rect.height;
      updateFromHSB();
    }

    function moveSBCursorTouch(e) {
      const t = e.touches[0];
      moveSBCursor({ clientX: t.clientX, clientY: t.clientY });
    }

    function moveHueThumb(e) {
      const rect = hueTrack.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      hsb.h = (x / rect.width) * 360;
      drawSBGradient();
      updateFromHSB();
    }

    function moveHueThumbTouch(e) {
      const t = e.touches[0];
      moveHueThumb({ clientX: t.clientX, clientY: t.clientY });
    }

    function drawSBGradient() {
      const w = sbCanvas.width  = sbBox.clientWidth  || 200;
      const h = sbCanvas.height = sbBox.clientHeight || 160;
      const hueHex = hsbToHex(hsb.h, 1, 1);
      const gradH = sbCtx.createLinearGradient(0, 0, w, 0);
      gradH.addColorStop(0, '#ffffff');
      gradH.addColorStop(1, hueHex);
      sbCtx.fillStyle = gradH;
      sbCtx.fillRect(0, 0, w, h);
      const gradV = sbCtx.createLinearGradient(0, 0, 0, h);
      gradV.addColorStop(0, 'rgba(0,0,0,0)');
      gradV.addColorStop(1, 'rgba(0,0,0,1)');
      sbCtx.fillStyle = gradV;
      sbCtx.fillRect(0, 0, w, h);
    }

    function updateHSBUI() {
      const boxW = sbBox.clientWidth  || 200;
      const boxH = sbBox.clientHeight || 160;
      sbCursor.style.left = (hsb.s * boxW) + 'px';
      sbCursor.style.top  = ((1 - hsb.b) * boxH) + 'px';
      const trackW = hueTrack.clientWidth || 190;
      hueThumb.style.left       = ((hsb.h / 360) * trackW) + 'px';
      hueThumb.style.background = hsbToHex(hsb.h, 1, 1);
      const hex = hsbToHex(hsb.h, hsb.s, hsb.b);
      swatch.style.background = hex;
      hexInput.value = hex.toUpperCase();
    }

    function updateFromHSB() {
      const hex = hsbToHex(hsb.h, hsb.s, hsb.b);
      updateColor(hex);
      updateHSBUI();
    }

    function onHexInputChange(val) {
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        const rgb = hexToRgb(val);
        const h2  = rgbToHSB(rgb.r, rgb.g, rgb.b);
        hsb.h = h2.h; hsb.s = h2.s; hsb.b = h2.b;
        drawSBGradient();
        updateFromHSB();
      }
    }

    /* ─ Color math ─ */
    function hsbToHex(h, s, b) {
      const c = b * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = b - c;
      let r, g, bv;
      if      (h < 60)  { r=c; g=x; bv=0; }
      else if (h < 120) { r=x; g=c; bv=0; }
      else if (h < 180) { r=0; g=c; bv=x; }
      else if (h < 240) { r=0; g=x; bv=c; }
      else if (h < 300) { r=x; g=0; bv=c; }
      else              { r=c; g=0; bv=x; }
      const R = Math.round((r+m)*255);
      const G = Math.round((g+m)*255);
      const B = Math.round((bv+m)*255);
      return '#' + [R,G,B].map(n => n.toString(16).padStart(2,'0')).join('');
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1,3),16),
        g: parseInt(hex.slice(3,5),16),
        b: parseInt(hex.slice(5,7),16)
      };
    }

    function rgbToHSB(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      const delta = max - min;
      let h = 0;
      if (delta !== 0) {
        if      (max === r) h = ((g - b) / delta) % 6;
        else if (max === g) h = (b - r) / delta + 2;
        else                h = (r - g) / delta + 4;
        h = ((h * 60) + 360) % 360;
      }
      return { h, s: max === 0 ? 0 : delta / max, b: max };
    }

    /* ══════════════════════════════════════════════
       LAYER LOGIC
    ══════════════════════════════════════════════ */
    function addLayer() {
      const canvas = document.createElement('canvas');
      canvas.width  = CANVAS_W;
      canvas.height = CANVAS_H;
      container.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      ctx.lineCap  = 'round';
      ctx.lineJoin = 'round';
      layers.unshift({
        id: Date.now(), canvas, ctx,
        visible: true, locked: false,
        opacity: 1, blend: 'source-over',
        name: 'Layer ' + (layers.length + 1)
      });
      activeIndex = 0;
      refreshLayers();
      saveState();
    }

    function refreshLayers() {
      layerListUI.innerHTML = '';
      layers.forEach((layer, i) => {
        layer.canvas.style.zIndex       = layers.length - i;
        layer.canvas.style.display      = layer.visible ? 'block' : 'none';
        layer.canvas.style.opacity      = layer.opacity;
        layer.canvas.style.mixBlendMode = layer.blend === 'source-over' ? 'normal' : layer.blend;

        const item = document.createElement('div');
        item.className     = `layer-item ${i === activeIndex ? 'selected' : ''}`;
        item.draggable     = true;
        item.dataset.index = i;

        item.addEventListener('dragstart', () => { dragItemIndex = i; item.classList.add('dragging'); });
        item.addEventListener('dragend',   () => item.classList.remove('dragging'));
        item.addEventListener('dragover',  e  => e.preventDefault());
        item.addEventListener('drop', e => {
          e.preventDefault();
          const moved = layers.splice(dragItemIndex, 1)[0];
          layers.splice(i, 0, moved);
          activeIndex = i;
          refreshLayers();
        });

        item.onclick = () => { activeIndex = i; refreshLayers(); };

        item.innerHTML = `
          <div class="layer-row-top">
            <span class="handle">≡</span>
            <input class="layer-name" value="${layer.name}"
              onchange="layers[${i}].name=this.value"
              onclick="event.stopPropagation()">
            <div class="layer-controls">
              <button class="btn-ui ${layer.locked ? 'btn-locked' : ''}"
                onclick="event.stopPropagation(); toggleLock(${i})">
                ${layer.locked ? '🔒' : '🔓'}
              </button>
              <button class="btn-ui"
                onclick="event.stopPropagation(); deleteLayer(${i})">🗑️</button>
              <button class="btn-ui"
                onclick="event.stopPropagation(); toggleVis(${i})">
                ${layer.visible ? '👁️' : '❌'}
              </button>
            </div>
          </div>
          <div class="layer-meta">
            <span>Blend</span>
            <select onchange="event.stopPropagation(); changeBlend(${i}, this.value)">
              <option value="source-over" ${layer.blend==='source-over'?'selected':''}>Normal</option>
              <option value="multiply"    ${layer.blend==='multiply'   ?'selected':''}>Multiply</option>
              <option value="screen"      ${layer.blend==='screen'     ?'selected':''}>Screen</option>
              <option value="overlay"     ${layer.blend==='overlay'    ?'selected':''}>Overlay</option>
            </select>
            <span>Op</span>
            <input type="range" min="0" max="100" value="${layer.opacity * 100}"
              oninput="event.stopPropagation(); changeLayerOp(${i}, this.value)">
          </div>`;

        layerListUI.appendChild(item);
      });
    }

    function mergeDown() {
      if (activeIndex >= layers.length - 1) return;
      const top    = layers[activeIndex];
      const bottom = layers[activeIndex + 1];
      bottom.ctx.globalAlpha              = top.opacity;
      bottom.ctx.globalCompositeOperation = top.blend;
      bottom.ctx.drawImage(top.canvas, 0, 0);
      bottom.ctx.globalAlpha              = 1;
      bottom.ctx.globalCompositeOperation = 'source-over';
      deleteLayer(activeIndex);
    }

    function changeLayerOp(i, val) { layers[i].opacity = val / 100; refreshLayers(); }
    function changeBlend(i, val)   { layers[i].blend   = val;       refreshLayers(); }
    function toggleVis(i)          { layers[i].visible = !layers[i].visible; refreshLayers(); }
    function toggleLock(i)         { layers[i].locked  = !layers[i].locked;  refreshLayers(); }

    function deleteLayer(i) {
      if (layers.length <= 1) return;
      container.removeChild(layers[i].canvas);
      layers.splice(i, 1);
      activeIndex = Math.max(0, i - 1);
      refreshLayers();
      saveState();
    }

    /* ══════════════════════════════════════════════
       DRAW LOGIC
    ══════════════════════════════════════════════ */
    function updateColor(c) {
      currentColor = c;
      document.querySelectorAll('.color-circle').forEach(circle => {
        const bg  = circle.style.backgroundColor;
        const hex = rgbToHex(bg);
        circle.classList.toggle('active-color', hex.toLowerCase() === c.toLowerCase());
      });
      if (swatch) swatch.style.background = c;
    }

    function rgbToHex(rgb) {
      const m = rgb.match(/\d+/g);
      if (!m) return rgb;
      return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
    }

    function updateBrushSize(v)    { currentSize  = v;       document.getElementById('val-brush-size').innerText  = v; }
    function updateEraserSize(v)   { eraserSize   = v;       document.getElementById('val-eraser-size').innerText = v; }
    function updateBrushOpacity(v) { brushOpacity = v / 100; document.getElementById('val-brush-op').innerText    = v + '%'; }

    document.querySelectorAll('.tool').forEach(t => {
      if (t.dataset.tool) {
        t.onclick = () => {
          document.querySelectorAll('.tool').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          currentTool = t.dataset.tool;
          if (t.dataset.size) currentSize = parseInt(t.dataset.size);
        };
      }
    });

    /* ─ Coordinate mapping ─ */
    function getCoordsByClient(clientX, clientY) {
      const wr  = wrapper.getBoundingClientRect();
      const wcx = wr.left + wr.width  / 2;
      const wcy = wr.top  + wr.height / 2;
      const dx = clientX - wcx;
      const dy = clientY - wcy;
      const tx = dx - transform.x;
      const ty = dy - transform.y;
      const cos = Math.cos(-transform.rot);
      const sin = Math.sin(-transform.rot);
      const rx = tx * cos - ty * sin;
      const ry = tx * sin + ty * cos;
      const ux = rx / transform.scale;
      const uy = ry / transform.scale;
      return {
        x: (ux + baseDisplayW / 2) * (CANVAS_W / baseDisplayW),
        y: (uy + baseDisplayH / 2) * (CANVAS_H / baseDisplayH)
      };
    }

    function getCoords(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return getCoordsByClient(clientX, clientY);
    }

    function startDrawing(e) {
      if (isEyedropperActive) return;
      const active = layers[activeIndex];
      if (!active || active.locked || !active.visible) return;
      isDrawing = true;
      const { x, y } = getCoords(e);
      active.ctx.beginPath();
      active.ctx.moveTo(x, y);
    }

    function draw(e) {
      if (!isDrawing || isEyedropperActive) return;
      const { x, y } = getCoords(e);
      const ctx = layers[activeIndex].ctx;
      ctx.globalAlpha = brushOpacity;
      if (currentTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = eraserSize;
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = currentColor;
        ctx.lineWidth   = currentSize;
      }
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function stopDrawing() {
      if (!isDrawing) return;
      isDrawing = false;
      const ctx = layers[activeIndex]?.ctx;
      if (ctx) { ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; }
      saveState();
    }

    /* ─ Mouse events ─ */
    wrapper.addEventListener('mousedown', e => {
      if (e.target === wrapper || e.target === container || layers.some(l => l.canvas === e.target)) {
        startDrawing(e);
      }
    });
    window.addEventListener('mousemove', e => { if (isDrawing) draw(e); });
    window.addEventListener('mouseup',   stopDrawing);

    /* ══════════════════════════════════════════════
       HISTORY
    ══════════════════════════════════════════════ */
    function saveState() {
      historyStack.push(layers.map(l => ({ id: l.id, data: l.canvas.toDataURL(), name: l.name })));
      if (historyStack.length > 20) historyStack.shift();
      redoStack = [];
    }

    function undo() {
      if (historyStack.length <= 1) return;
      redoStack.push(historyStack.pop());
      applyState(historyStack[historyStack.length - 1]);
    }

    function redo() {
      if (!redoStack.length) return;
      const next = redoStack.pop();
      historyStack.push(next);
      applyState(next);
    }

    function applyState(state) {
      state.forEach(s => {
        const target = layers.find(l => l.id === s.id);
        if (!target) return;
        const img = new Image();
        img.src    = s.data;
        img.onload = () => {
          target.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
          target.ctx.drawImage(img, 0, 0);
        };
      });
    }

    /* ══════════════════════════════════════════════
       LAYER PANEL TOGGLE
    ══════════════════════════════════════════════ */
    function toggleLayerPanel() {
      const p = document.getElementById('layer-panel');
      p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = init;
  </script>
</body>
</html>
