<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Canvas - Advanced Layer System</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2d2d2d; --accent: #00a2ff; --text: #eee; --danger: #dc3545; }
        /* Perbaikan CSS: touch-action manipulation agar input bisa diinteraksi */
        * { box-sizing: border-box; touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); overflow: hidden; display: flex; height: 100vh; }

        /* TOOLBAR KIRI */
        #toolbar { width: 75px; background: var(--panel); display: flex; flex-direction: column; align-items: center; padding: 10px 5px; gap: 8px; border-right: 1px solid #444; z-index: 100; flex-shrink: 0; }
        .history-tools { display: flex; gap: 4px; width: 65px; }
        .btn-hist { flex: 1; height: 35px; background: #444; border: 1px solid #555; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        #color-palette { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; width: 65px; }
        .color-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #555; cursor: pointer; }
        .color-circle.active-color { border-color: white; box-shadow: 0 0 5px white; }

        .tool { width: 65px; height: 50px; cursor: pointer; background: #3d3d3d; border: 1px solid #555; border-radius: 10px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; transition: 0.2s; }
        .tool.active { border: 2px solid var(--accent); background: #4a4a4a; box-shadow: 0 0 10px var(--accent); }

        /* CANVAS AREA */
        #canvas-wrapper { flex-grow: 1; position: relative; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        #canvas-container { position: relative; width: 100%; height: 100%; transform-origin: center; transition: transform 0.05s ease-out; background: white; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* LAYER PANEL */
        #layer-panel { position: fixed; left: 85px; top: 10px; bottom: 80px; width: 280px; background: var(--panel); border-radius: 15px; display: none; flex-direction: column; border: 1px solid #444; box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 200; }
        .panel-header { padding: 12px 15px; background: #383838; font-weight: bold; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }
        #layer-list { overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        
        .layer-item { background: #3d3d3d; padding: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; border: 2px solid transparent; }
        .layer-item.selected { border-color: var(--accent); background: #4a4a4a; }
        .layer-item.dragging { opacity: 0.5; background: #555; }
        .layer-row-top { display: flex; align-items: center; gap: 8px; }
        .layer-name { font-size: 11px; font-weight: bold; flex-grow: 1; cursor: text; background: transparent; border: none; color: white; }
        .layer-controls { display: flex; gap: 4px; align-items: center; }
        .layer-meta { display: flex; align-items: center; gap: 5px; padding: 0 5px; }
        .layer-meta select { background: #222; color: white; border: none; font-size: 10px; border-radius: 4px; padding: 2px; }
        .layer-meta input[type="range"] { width: 50px; }

        /* FLOATING PANELS */
        .floating-panel { position: fixed; right: 20px; bottom: 90px; width: 220px; background: var(--panel); border: 1px solid #555; border-radius: 12px; padding: 15px; display: none; flex-direction: column; gap: 10px; z-index: 205; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .floating-panel h4 { margin: 0 0 5px 0; font-size: 12px; color: var(--accent); }
        .setting-row { display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .setting-row:last-child { border: none; }
        .setting-row label { font-size: 10px; display: flex; justify-content: space-between; }
        /* Memastikan input range mudah digeser */
        input[type="range"] { touch-action: auto; cursor: pointer; }

        #zoom-controls { position: fixed; right: 20px; bottom: 150px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .btn-round { width: 45px; height: 45px; border-radius: 50%; background: #444; color: white; border: 1px solid #666; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .toggle-layers-btn { position: fixed; right: 20px; bottom: 20px; padding: 0 20px; height: 50px; background: var(--accent); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; z-index: 101; }

        .handle { cursor: grab; color: #888; padding: 5px; font-size: 18px; }
        .btn-ui { background: #555; border: none; color: white; border-radius: 4px; padding: 4px 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="history-tools">
            <button class="btn-hist" onclick="undo()">&lt;</button>
            <button class="btn-hist" onclick="redo()">&gt;</button>
        </div>
        <hr style="width: 100%; border-color: #444; margin: 2px 0;">
        <div id="color-palette"></div>
        <button class="tool" onclick="toggleFloating('color-panel')">🎨<br>Pick</button>
        <hr style="width: 100%; border-color: #444; margin: 2px 0;">
        
        <div class="tool active" data-tool="brush"><span>🖌️</span>Brush</div>
        <div class="tool" data-tool="eraser"><span>🧽</span>Eraser</div>
        <div class="tool" data-tool="picker"><span>🧪</span>Picker</div>
        
        <button class="tool" onclick="toggleFloating('brush-panel')">⚙️<br>Settings</button>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container">
            </div>
    </div>

    <div id="zoom-controls">
        <button class="btn-round" onclick="changeZoom(0.1)">+</button>
        <button class="btn-round" onclick="changeZoom(-0.1)">-</button>
        <button class="btn-round" onclick="resetZoom()" style="font-size: 10px;">Reset</button>
    </div>

    <button class="toggle-layers-btn" onclick="toggleLayerPanel()">📑 LAYERS</button>

    <div id="brush-panel" class="floating-panel" ontouchstart="event.stopPropagation()">
        <h4>Brush & Eraser Settings</h4>
        <div class="setting-row">
            <label>Brush Size <span id="val-brush-size">2</span></label>
            <input type="range" min="1" max="200" value="2" oninput="currentSize = parseInt(this.value); updateUIVal('val-brush-size', this.value)">
        </div>
        <div class="setting-row">
            <label>Brush Opacity <span id="val-brush-op">100%</span></label>
            <input type="range" min="1" max="100" value="100" oninput="brushOpacity = this.value/100; updateUIVal('val-brush-op', this.value + '%')">
        </div>
        <div class="setting-row">
            <label>Eraser Size <span id="val-eraser-size">20</span></label>
            <input type="range" min="1" max="200" value="20" oninput="eraserSize = parseInt(this.value); updateUIVal('val-eraser-size', this.value)">
        </div>
        <div class="setting-row">
            <label>Eraser Opacity <span id="val-eraser-op">100%</span></label>
            <input type="range" min="1" max="100" value="100" oninput="eraserOpacity = this.value/100; updateUIVal('val-eraser-op', this.value + '%')">
        </div>
    </div>

    <div id="color-panel" class="floating-panel" ontouchstart="event.stopPropagation()">
        <h4>Color Picker</h4>
        <input type="color" id="main-color-input" style="width:100%; height:80px; border:none; background:none; cursor: pointer;" oninput="updateColor(this.value)">
        <div id="color-hex" style="text-align:center; font-family:monospace; margin-top:5px;">#000000</div>
    </div>

    <div id="layer-panel" ontouchstart="event.stopPropagation()">
        <div class="panel-header">
            LAYERS
            <button class="btn-ui" style="background:var(--accent)" onclick="addLayer()">+ New</button>
        </div>
        <div id="layer-list"></div>
        <div style="padding: 10px; border-top: 1px solid #444;">
            <button class="btn-ui" style="width:100%" onclick="mergeDown()">▼ Merge Down</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const layerListUI = document.getElementById('layer-list');
        const paletteUI = document.getElementById('color-palette');
        
        let layers = [];
        let activeIndex = 0;
        let isDrawing = false;
        let currentTool = 'brush';
        
        // Settings Terpisah
        let currentSize = 2;
        let brushOpacity = 1.0;
        let eraserSize = 20;
        let eraserOpacity = 1.0;
        
        let currentColor = '#000000';
        let zoomScale = 1;
        let historyStack = [];
        let redoStack = [];

        // Zoom & Pinch
        let initialDist = 0;
        let initialScale = 1;

        const customColors = ['#FFC74E', '#000000', '#FFFFFF', '#BE6D6A', '#747DAB', '#767676'];

        function init() {
            customColors.forEach(color => {
                const circle = document.createElement('div');
                circle.className = `color-circle ${color === '#000000' ? 'active-color' : ''}`;
                circle.style.backgroundColor = color;
                circle.onclick = (e) => { e.stopPropagation(); updateColor(color); };
                paletteUI.appendChild(circle);
            });
            addLayer();
        }

        function updateUIVal(id, val) { document.getElementById(id).innerText = val; }

        // --- LAYER ACTIONS ---
        function addLayer() {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            const layerObj = { 
                id: Date.now(), canvas, ctx, visible: true, locked: false, alphaLock: false,
                opacity: 1, blend: 'source-over', name: "Layer " + (layers.length + 1) 
            };
            layers.unshift(layerObj);
            activeIndex = 0;
            refreshLayers();
            saveState();
        }

        function refreshLayers() {
            layerListUI.innerHTML = '';
            layers.forEach((layer, i) => {
                layer.canvas.style.zIndex = layers.length - i;
                layer.canvas.style.display = layer.visible ? 'block' : 'none';
                layer.canvas.style.opacity = layer.opacity;
                layer.canvas.style.mixBlendMode = layer.blend === 'source-over' ? 'normal' : layer.blend;
                
                const item = document.createElement('div');
                item.className = `layer-item ${i === activeIndex ? 'selected' : ''}`;
                item.dataset.index = i;
                item.onclick = () => { activeIndex = i; refreshLayers(); };
                
                item.innerHTML = `
                    <div class="layer-row-top">
                        <div class="handle">≡</div>
                        <input class="layer-name" value="${layer.name}" onchange="layers[${i}].name=this.value" onclick="event.stopPropagation()">
                        <div class="layer-controls">
                            <button class="btn-ui" onclick="event.stopPropagation(); toggleAlphaLock(${i})">${layer.alphaLock ? '🔒' : '🔓'}</button>
                            <button class="btn-ui" onclick="event.stopPropagation(); toggleVis(${i})">${layer.visible ? '👁️' : '❌'}</button>
                            <button class="btn-ui" style="background:var(--danger)" onclick="event.stopPropagation(); deleteLayer(${i})">🗑️</button>
                        </div>
                    </div>
                    <div class="layer-meta">
                        <select onchange="event.stopPropagation(); layers[${i}].blend=this.value; refreshLayers()">
                            <option value="source-over" ${layer.blend==='source-over'?'selected':''}>Normal</option>
                            <option value="multiply" ${layer.blend==='multiply'?'selected':''}>Multiply</option>
                            <option value="screen" ${layer.blend==='screen'?'selected':''}>Screen</option>
                        </select>
                        <input type="range" min="0" max="100" value="${layer.opacity*100}" oninput="event.stopPropagation(); layers[${i}].opacity=this.value/100; refreshLayers()">
                    </div>
                `;

                const h = item.querySelector('.handle');
                h.ontouchstart = (e) => { e.stopPropagation(); startDrag(e, item, i); };
                layerListUI.appendChild(item);
            });
        }

        function toggleAlphaLock(i) {
            layers[i].alphaLock = !layers[i].alphaLock;
            refreshLayers();
        }

        function toggleVis(i) {
            layers[i].visible = !layers[i].visible;
            refreshLayers();
        }

        let dragItem = null;
        function startDrag(e, item, index) {
            dragItem = item;
            item.classList.add('dragging');
            const onMove = (me) => {
                const target = document.elementFromPoint(me.touches[0].clientX, me.touches[0].clientY)?.closest('.layer-item');
                if (target && target !== dragItem) {
                    const toIdx = parseInt(target.dataset.index);
                    const fromIdx = parseInt(dragItem.dataset.index);
                    const moved = layers.splice(fromIdx, 1)[0];
                    layers.splice(toIdx, 0, moved);
                    activeIndex = toIdx;
                    refreshLayers();
                    dragItem = layerListUI.children[toIdx];
                    dragItem.classList.add('dragging');
                }
            };
            const onEnd = () => {
                if (dragItem) dragItem.classList.remove('dragging');
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            };
            document.addEventListener('touchmove', onMove);
            document.addEventListener('touchend', onEnd);
        }

        function deleteLayer(i) {
            if (layers.length <= 1) return;
            container.removeChild(layers[i].canvas);
            layers.splice(i, 1);
            activeIndex = Math.max(0, activeIndex - 1);
            refreshLayers();
            saveState();
        }

        function mergeDown() {
            if (activeIndex >= layers.length - 1) return;
            const top = layers[activeIndex];
            const bottom = layers[activeIndex + 1];
            bottom.ctx.save();
            bottom.ctx.globalAlpha = top.opacity;
            bottom.ctx.globalCompositeOperation = top.blend;
            bottom.ctx.drawImage(top.canvas, 0, 0);
            bottom.ctx.restore();
            deleteLayer(activeIndex);
        }

        // --- TOOL ACTIONS ---
        function updateColor(c) {
            currentColor = c;
            document.getElementById('main-color-input').value = c;
            document.getElementById('color-hex').innerText = c.toUpperCase();
            document.querySelectorAll('.color-circle').forEach(circle => {
                const bg = circle.style.backgroundColor;
                // Simple color matching
                circle.classList.toggle('active-color', false);
            });
        }

        function toggleFloating(id) {
            const el = document.getElementById(id);
            const isVisible = el.style.display === 'flex';
            document.querySelectorAll('.floating-panel').forEach(p => p.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'flex';
        }

        function changeZoom(amt) {
            zoomScale = Math.min(Math.max(0.1, zoomScale + amt), 8);
            container.style.transform = `scale(${zoomScale})`;
        }
        function resetZoom() { zoomScale = 1; container.style.transform = `scale(1)`; }

        // --- DRAW LOGIC ---
        function getCoords(e) {
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { 
                x: (clientX - rect.left) / zoomScale, 
                y: (clientY - rect.top) / zoomScale,
                rawX: clientX,
                rawY: clientY
            };
        }

        function pickColor(x, y) {
            // Gabungkan semua layer visible untuk sampling warna asli
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = container.offsetWidth;
            tempCanvas.height = container.offsetHeight;
            const tCtx = tempCanvas.getContext('2d');
            for(let i = layers.length-1; i >= 0; i--) {
                if(layers[i].visible) {
                    tCtx.globalAlpha = layers[i].opacity;
                    tCtx.drawImage(layers[i].canvas, 0, 0);
                }
            }
            const data = tCtx.getImageData(x, y, 1, 1).data;
            const hex = "#" + ((1 << 24) + (data[0] << 16) + (data[1] << 8) + data[2]).toString(16).slice(1);
            updateColor(hex);
            currentTool = 'brush';
            document.querySelectorAll('.tool').forEach(x => {
                x.classList.toggle('active', x.dataset.tool === 'brush');
            });
        }

        function startDrawing(e) {
            if (e.touches && e.touches.length > 1) {
                isDrawing = false;
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                initialScale = zoomScale;
                return;
            }
            const {x, y} = getCoords(e);
            
            if (currentTool === 'picker') {
                pickColor(x, y);
                return;
            }

            const active = layers[activeIndex];
            if (!active || !active.visible) return;
            
            isDrawing = true;
            active.ctx.beginPath();
            active.ctx.moveTo(x, y);
        }

        function draw(e) {
            if (e.touches && e.touches.length > 1) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                zoomScale = Math.min(Math.max(0.1, initialScale * (dist / initialDist)), 8);
                container.style.transform = `scale(${zoomScale})`;
                return;
            }
            
            if (!isDrawing) return;
            const {x, y} = getCoords(e);
            const active = layers[activeIndex];
            const ctx = active.ctx;

            ctx.save();
            
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.globalAlpha = eraserOpacity;
                ctx.lineWidth = eraserSize;
            } else {
                // Alpha Lock check
                ctx.globalCompositeOperation = active.alphaLock ? 'source-atop' : 'source-over';
                ctx.globalAlpha = brushOpacity;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.restore();
        }

        function stopDrawing() { 
            if (isDrawing) { 
                isDrawing = false; 
                saveState(); 
            } 
        }

        // --- HISTORY ---
        function saveState() {
            const state = layers.map(l => ({ id: l.id, data: l.canvas.toDataURL() }));
            historyStack.push(state);
            if (historyStack.length > 20) historyStack.shift();
            redoStack = [];
        }

        function undo() {
            if (historyStack.length <= 1) return;
            redoStack.push(historyStack.pop());
            const state = historyStack[historyStack.length - 1];
            applyState(state);
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            historyStack.push(state);
            applyState(state);
        }

        function applyState(state) {
            state.forEach(ls => {
                const l = layers.find(lay => lay.id === ls.id);
                if (l) {
                    const img = new Image();
                    img.src = ls.data;
                    img.onload = () => { 
                        l.ctx.clearRect(0,0,l.canvas.width,l.canvas.height); 
                        l.ctx.drawImage(img,0,0); 
                    };
                }
            });
        }

        document.querySelectorAll('.tool').forEach(t => {
            t.onclick = () => {
                if (!t.dataset.tool) return;
                document.querySelectorAll('.tool').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                currentTool = t.dataset.tool;
            };
        });

        function toggleLayerPanel() { 
            const p = document.getElementById('layer-panel'); 
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; 
        }

        // Touch Listeners
        const wrap = document.getElementById('canvas-wrapper');
        wrap.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
        wrap.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        wrap.addEventListener('touchend', stopDrawing);
        
        window.onload = init;
    </script>
</body>
</html>
