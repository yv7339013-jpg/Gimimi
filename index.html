<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            background-color: #000;
        }
        h1 { margin-bottom: 10px; color: #00ffcc; }
        .score { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>NEON SNAKE</h1>
    <div class="score">Skor: <span id="scoreVal">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const box = 20; // Ukuran satu kotak grid
        let snake = [{ x: 10 * box, y: 10 * box }]; // Posisi awal ular
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let score = 0;
        let d; // Arah

        // Mendengarkan input keyboard
        document.addEventListener("keydown", direction);

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            // Bersihkan Canvas
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gambar Ular
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ffcc" : "#008866";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Gambar Makanan
            ctx.fillStyle = "#ff0055";
            ctx.fillRect(food.x, food.y, box, box);

            // Posisi Kepala Lama
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Arah Gerak
            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Logika Makan
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop(); // Hapus ekor jika tidak makan
            }

            // Kepala Baru
            let newHead = { x: snakeX, y: snakeY };

            // Game Over (Tabrak dinding atau diri sendiri)
            if(snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Skor kamu: " + score);
                location.reload(); // Restart game
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 100); // Jalankan fungsi draw setiap 100ms
    </script>
</body>
</html>
